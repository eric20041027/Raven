# SQL Injection 規則（call 類規則，需引擎支援 call handler）
id: SQL-001
name: SQL Injection
severity: HIGH
cwe: CWE-89
message: SQL 查詢直接拼接使用者輸入，可能導致 SQL Injection。建議使用參數化查詢（如 execute(sql, params)）。

match:
  node_type: call
  function_name: [execute, query, raw, executemany]   # 危險的資料庫函式
  argument_has: binary_operator                         # 參數含字串拼接 → 危險訊號

# Hardcoded Secret 規則（從 M1 寫死的 Python 邏輯翻譯而來）
# 引擎讀這份「資料」，套到 AST 上 —— 規則內容與引擎邏輯分離。
id: SECRET-001
name: Hardcoded Secret
severity: HIGH
cwe: CWE-798
message: 密鑰寫死於原始碼，任何能讀到程式碼的人都能取得憑證。建議改用環境變數。

match:
  node_type: assignment        # 找「賦值」節點
  right_type: string           # 右邊必須是字串（結構條件，排除 os.environ[...]）
  any_of:                      # 以下任一成立就命中（高精度信號）
    - name_contains: [key, password, passwd, secret, token, api]
    - value_prefix: [sk-, ghp_, xox, AKIA]
  # 兜底信號：沒有已知前綴、變數名也不可疑，但「又長又像亂碼」的字串。
  # 熵+長度雙條件（all_of），比單看長度穩 —— 單看長度會把 URL/模型名/prompt
  # 都誤報；單看熵又擋不掉 URL（熵也偏高）。閾值取保守值只抓明確亂碼。
  all_of:                      # 全部成立才命中（「且」）
    - value_entropy_min: 4.2   # 亂度夠高（一般可讀字串到不了）
    - value_min_length: 20     # 且夠長（短亂碼多半不是密鑰）
